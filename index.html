<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Agents Mastery Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>🤖 AI Agents Mastery Tracker</h1>
      <p class="subtitle">Track your journey from curiosity to mastery</p>
      <div class="overall-progress">
        <div class="progress-bar-container">
          <div class="progress-bar" id="overallBar"></div>
        </div>
        <div class="progress-stats">
          <span id="overallPercent">0%</span>
          <span id="overallDetail">0 / 0 subtopics mastered</span>
        </div>
      </div>
      <button class="reset-btn" id="resetBtn">🔄 Reset All</button>
      <button class="reset-btn" id="referencesBtn" style="margin-left:8px">📚 References</button>
    </header>
    <main class="topics" id="topicsContainer"></main>
  </div>

  <!-- Reset Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2>⚠️ Reset Progress?</h2>
      <p>This will reset all subtopics and quiz results to "Not Started". This cannot be undone.</p>
      <div class="modal-actions">
        <button class="modal-btn cancel" id="cancelReset">Cancel</button>
        <button class="modal-btn confirm" id="confirmReset">Reset All</button>
      </div>
    </div>
  </div>

  <!-- Celebration -->
  <div class="celebration" id="celebration">
    <div class="celebration-content">
      <div class="trophy">🏆</div>
      <h2>Topic Mastered!</h2>
      <p id="celebrationText"></p>
      <button class="modal-btn confirm" id="closeCelebration">Awesome!</button>
    </div>
  </div>

  <!-- Lesson Overlay -->
  <div class="lesson-overlay" id="lessonOverlay">
    <div class="lesson-panel">
      <button class="lesson-close" onclick="closeLesson()">← Back</button>
      <h2 class="lesson-title" id="lessonTitle"></h2>
      <div class="lesson-body" id="lessonContent"></div>
      <div class="lesson-actions" id="lessonActions"></div>
    </div>
  </div>

  <!-- Quiz Overlay -->
  <div class="quiz-overlay" id="quizOverlay">
    <div class="quiz-panel">
      <button class="quiz-close" onclick="closeQuiz()">✕</button>
      <div class="quiz-content" id="quizContent"></div>
    </div>
  </div>

  <script src="app.js"></script>
<div id="referencesOverlay" class="modal-overlay">
  <div class="modal-content references-modal">
    <h2>📚 All References</h2>
    <div id="referencesList"></div>
    <button class="quiz-btn-close" onclick="document.getElementById('referencesOverlay').classList.remove('active')">✓ Close</button>
  </div>
</div>
</body>
</html>
